spring.application.name=petmarket-backend

# Datasource Configuration
# Use environment variables: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
# Use environment variable: APP_JWT_SECRET
# Generate with: openssl rand -base64 32
app.jwt.expiration-ms=86400000

# Server Configuration
server.port=8080

# CORS Configuration
# Use environment variable: APP_CORS_ALLOWED_ORIGINS (comma-separated list)
# Example: http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000

# Bootstrap Admin Configuration
# Use environment variables:
# - APP_BOOTSTRAP_ADMIN_ENABLED (true/false)
# - APP_BOOTSTRAP_ADMIN_EMAIL
# - APP_BOOTSTRAP_ADMIN_PASSWORD
# - APP_BOOTSTRAP_ADMIN_FULL_NAME
app.bootstrap.admin.full-name=PetMarket Admin
