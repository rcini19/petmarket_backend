spring.application.name=petmarket-backend

# Datasource Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/petmarket_dev}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:dev-secret-key-256bit-this-is-only-for-development-testing-purposes}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Server Configuration
server.port=${SERVER_PORT:${PORT:8080}}

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080}

# Bootstrap Admin Configuration
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@petmarket.local}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:AdminPassword123!}
app.bootstrap.admin.full-name=${APP_BOOTSTRAP_ADMIN_FULL_NAME:PetMarket Admin}
