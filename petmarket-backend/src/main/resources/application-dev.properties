# ============================================================
# Development Profile Configuration
# ============================================================
# To use this profile, set: SPRING_PROFILES_ACTIVE=dev
# Or run: mvn spring-boot:run -Dspring-boot.run.arguments="--spring.profiles.active=dev"

# PostgreSQL/Supabase Development Configuration
# Option 1: Use environment variables for Supabase (RECOMMENDED)
# Set these environment variables:
#   SPRING_DATASOURCE_URL=your-supabase-connection-string
#   SPRING_DATASOURCE_USERNAME=postgres
#   SPRING_DATASOURCE_PASSWORD=your-supabase-password
#
# Option 2: Hardcode for local testing (not recommended)
# spring.datasource.url=jdbc:postgresql://localhost:5432/petmarket_dev
# spring.datasource.username=postgres
# spring.datasource.password=postgres

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/petmarket_dev}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA / Hibernate - Show SQL for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration - Development secret (NOT FOR PRODUCTION)
# Generate a new secret for production: openssl rand -base64 32
app.jwt.secret=dev-secret-key-256bit-this-is-only-for-development-testing-purposes

# CORS Configuration - Allow localhost ports
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080

# Bootstrap Admin Configuration - Enabled for development
app.bootstrap.admin.enabled=true
app.bootstrap.admin.email=admin@petmarket.local
app.bootstrap.admin.password=AdminPassword123!
