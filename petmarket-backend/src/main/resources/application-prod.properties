# ============================================================
# Production Profile Configuration
# ============================================================
# IMPORTANT: This file uses environment variables exclusively.
# All sensitive values MUST be set as environment variables.
#
# Required environment variables (examples):
#   SPRING_DATASOURCE_URL=jdbc:postgresql://prod-db.example.com:5432/petmarket_prod
#   SPRING_DATASOURCE_USERNAME=petmarket_user
#   SPRING_DATASOURCE_PASSWORD=<strong-random-password>
#   APP_JWT_SECRET=<generated-256-bit-secret>
#   APP_CORS_ALLOWED_ORIGINS=https://petmarket.example.com,https://www.petmarket.example.com
#   APP_BOOTSTRAP_ADMIN_ENABLED=false
#
# To run with production profile:
#   export SPRING_PROFILES_ACTIVE=prod
#   ./mvnw spring-boot:run

# PostgreSQL Production Configuration
# These MUST be set as environment variables!
# spring.datasource.url=${SPRING_DATASOURCE_URL}
# spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
# spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA / Hibernate - Optimized for production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration - MUST be set as environment variable!
# Generate with: openssl rand -base64 32
# app.jwt.secret=${APP_JWT_SECRET}

# CORS Configuration - Set to specific production domains only
# app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# Bootstrap Admin Configuration - DISABLED in production
# Only enable if needed for initial setup, then disable immediately
app.bootstrap.admin.enabled=false
